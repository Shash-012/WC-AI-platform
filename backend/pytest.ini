[pytest]
testpaths = tests
# Put the backend/ root on sys.path so `import modules.scout...` resolves
# regardless of how pytest is invoked (plain `pytest` or `python -m pytest`).
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# suppress the ConversationBufferMemory deprecation warning from LangChain
filterwarnings =
    ignore::DeprecationWarning:langchain
markers =
    integration: marks tests as integration tests (deselect with -m "not integration")
